<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌤️ Clima · Santa Cruz de la Sierra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="eyebrow">☀️ Pronóstico por hora</div>
      <h1>🌎 Clima en Santa Cruz de la Sierra</h1>
    </div>
    <div class="header-right">
      <div class="coords">📍 17.8254° S · 63.1386° O</div>
      <button id="refresh-btn" type="button">🔄 Actualizar</button>
    </div>
  </header>

  <div id="status">⏳ Cargando datos de Open‑Meteo…</div>

  <div id="content">

    <section class="hero">
      <div class="hero-emoji" id="hero-emoji">☀️</div>
      <div class="hero-temp">
        <span class="num" id="hero-temp">—</span>
        <span class="unit">°C</span>
      </div>
      <div class="hero-meta">
        <div class="hero-desc" id="hero-desc">—</div>
        <div class="hero-time" id="hero-time">—</div>
      </div>
    </section>

    <section class="grid" id="stat-grid"></section>

    <section>
      <div class="section-head">
        <div class="section-title">📈 Próximas 24 horas</div>
        <div class="section-sub" id="hourly-range">—</div>
      </div>
      <div class="hourly-panel">
        <svg id="hourly-chart" viewBox="0 0 920 220" width="920" height="220" preserveAspectRatio="xMinYMin meet"></svg>
        <div class="legend">
          <span class="legend-item"><span class="legend-swatch" style="background:var(--accent-temp)"></span>🌡️ Temperatura</span>
          <span class="legend-item"><span class="legend-swatch" style="background:var(--accent-rainprob)"></span>🌧️ Probabilidad de lluvia</span>
        </div>
      </div>
    </section>

  </div>

  <footer>
    <span>Fuente: open-meteo.com</span>
    <span id="last-updated"></span>
  </footer>

</div>

<script src="js/script.js"></script>
</body>
</html>
