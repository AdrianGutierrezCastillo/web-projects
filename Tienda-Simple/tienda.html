<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Simple - Catalogo</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <header class="encabezado">
    <div class="contenedor barra-encabezado">
      <a href="tienda.html" class="logo">Tienda Simple</a>
      <div class="acciones-encabezado">
        <span class="usuario-actual" id="nombreUsuario"></span>
        <button class="boton boton-secundario insignia-carrito" id="botonAbrirCarrito">
          Carrito
          <span class="contador-carrito oculto" id="contadorCarrito">0</span>
        </button>
        <button class="boton boton-secundario" id="botonCerrarSesion">Salir</button>
      </div>
    </div>
  </header>

  <main class="contenedor">
    <div class="barra-herramientas">
      <h1 class="titulo-seccion">Catalogo de productos</h1>
      <div class="controles-filtro">
        <input type="text" id="buscador" placeholder="Buscar producto" />
        <select id="filtroCategoria">
          <option value="">Todas las categorias</option>
        </select>
      </div>
    </div>

    <div class="cuadricula-productos" id="cuadriculaProductos"></div>
  </main>

  <div class="fondo-oscurecido oculto" id="fondoCarrito"></div>
  <aside class="panel-lateral" id="panelCarrito">
    <div class="encabezado-panel">
      <h2>Tu carrito</h2>
      <button class="cerrar-panel" id="botonCerrarCarrito">&times;</button>
    </div>
    <div class="cuerpo-panel" id="listaCarrito"></div>
    <div class="pie-panel">
      <div class="fila-total">
        <span>Total</span>
        <span id="totalCarrito">$0.00</span>
      </div>
      <button class="boton boton-primario boton-ancho" id="botonFinalizarCompra">
        Finalizar compra
      </button>
    </div>
  </aside>

  <script src="js/almacenamiento.js"></script>
  <script src="js/tienda.js"></script>
</body>
</html>
