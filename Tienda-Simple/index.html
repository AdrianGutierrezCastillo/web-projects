<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Simple - Acceso</title>
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>
  <div class="pantalla-centrada">
    <div class="tarjeta panel-auth">
      <h1>Tienda Simple</h1>
      <p class="subtitulo">Ingresa a tu cuenta o crea una nueva</p>

      <div class="pestanas">
        <button class="pestana activa" id="pestanaLogin">Iniciar sesion</button>
        <button class="pestana" id="pestanaRegistro">Crear cuenta</button>
      </div>

      <div id="errorMensaje" class="mensaje-error oculto"></div>

      <form id="formularioLogin">
        <div class="campo">
          <label for="loginEmail">Correo electronico</label>
          <input type="email" id="loginEmail" required />
        </div>
        <div class="campo">
          <label for="loginPassword">Contrasena</label>
          <input type="password" id="loginPassword" required />
        </div>
        <button type="submit" class="boton boton-primario boton-ancho">Ingresar</button>
      </form>

      <form id="formularioRegistro" class="oculto">
        <div class="campo">
          <label for="registroNombre">Nombre completo</label>
          <input type="text" id="registroNombre" required />
        </div>
        <div class="campo">
          <label for="registroEmail">Correo electronico</label>
          <input type="email" id="registroEmail" required />
        </div>
        <div class="campo">
          <label for="registroPassword">Contrasena</label>
          <input type="password" id="registroPassword" required minlength="4" />
        </div>
        <button type="submit" class="boton boton-primario boton-ancho">Crear cuenta</button>
      </form>
    </div>
  </div>

  <script src="js/almacenamiento.js"></script>
  <script src="js/autenticacion.js"></script>
</body>
</html>
