<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>Tareas</h1>
  </header>

  <div class="form-nueva-tarea clay">
    <input type="text" id="input-tarea" placeholder="Nueva tarea" maxlength="80">
    <button class="btn-agregar" id="btn-agregar" aria-label="Agregar tarea">+</button>
  </div>

  <ul id="lista-tareas"></ul>

  <p id="vacio">No hay tareas</p>

  <p id="contador"></p>

</div>

<script src="script.js"></script>

</body>
</html>
